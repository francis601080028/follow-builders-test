name: AI Builders Digest

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4   # ✅ 升级

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20   # 或 22（更稳）

      - name: Install dependencies
        run: npm install

      - name: Run digest script
        run: node scripts/prepare-digest.js
