name: AI Builders Digest

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 拉代码
      - name: Checkout repo
        uses: actions/checkout@v4

      # Node 环境（锁定 LTS）
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # 安装依赖（避免 npm ci 报错）
      - name: Install dependencies
        run: npm install

      # 运行主脚本
      - name: Run digest script
        run: node scripts/prepare-digest.js
